<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="黄金报价看板，支持微信链接打开，展示国际金价、人民币克价和简明趋势。"
    />
    <title>黄金报价</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="黄金报价概览">
        <div class="hero-copy">
          <p class="eyebrow">Gold Quote</p>
          <h1>黄金报价</h1>
          <p class="summary" id="summaryText">正在获取实时行情...</p>
        </div>
        <div class="price-card primary-card" aria-live="polite">
          <span class="card-label">国际现货金</span>
          <strong id="xauUsd">--</strong>
          <span class="unit">美元 / 盎司</span>
          <span class="status-pill" id="dataStatus">连接中</span>
        </div>
      </section>

      <section class="quote-grid" aria-label="报价详情">
        <article class="price-card">
          <span class="card-label">人民币参考价</span>
          <strong id="cnyGram">--</strong>
          <span class="unit">元 / 克</span>
        </article>
        <article class="price-card">
          <span class="card-label">美元兑人民币</span>
          <strong id="usdCny">--</strong>
          <span class="unit">USD/CNY</span>
        </article>
        <article class="price-card">
          <span class="card-label">日内区间</span>
          <strong id="dayRange">--</strong>
          <span class="unit">美元 / 盎司</span>
        </article>
      </section>

      <section class="chart-panel" aria-label="走势预览">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Trend</p>
            <h2>报价走势</h2>
          </div>
          <button class="icon-button" id="refreshBtn" type="button" aria-label="刷新报价" title="刷新报价">
            ↻
          </button>
        </div>
        <canvas id="trendCanvas" width="720" height="320" role="img" aria-label="黄金报价趋势线"></canvas>
      </section>

      <section class="info-band" aria-label="说明">
        <div>
          <span class="info-label">更新时间</span>
          <strong id="updatedAt">--</strong>
        </div>
        <div>
          <span class="info-label">数据来源</span>
          <strong>Stooq + Frankfurter</strong>
        </div>
      </section>

      <p class="notice">
        报价仅作展示参考，不构成投资建议。不同金店、交易所和银行报价会因手续费、点差、品牌溢价而不同。
      </p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
